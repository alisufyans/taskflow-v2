services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: taskflow-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure secret
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL
      - key: MAX_FILE_SIZE
        value: 5242880
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: taskflow-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Set to your backend Render URL + /api
      - key: REACT_APP_SOCKET_URL
        sync: false          # Set to your backend Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
